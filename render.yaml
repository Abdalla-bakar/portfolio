services:
  - type: web
    name: abdalla-portfolio
    runtime: static
    buildCommand: ""
    staticPublishPath: ./site
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
